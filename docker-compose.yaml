services:
  # ==========================================
  # INFRAESTRUCTURA Y BASES DE DATOS
  # ==========================================
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: c5_mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./config/mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      - c5_network

  redis:
    image: redis:alpine
    container_name: c5_redis
    ports:
      - "6379:6379"
    networks:
      - c5_network

  postgres-primary:
    image: bitnami/postgresql:latest
    container_name: c5_postgres_primary
    environment:
      - POSTGRESQL_REPLICATION_MODE=master
      - POSTGRESQL_REPLICATION_USER=repl_user
      - POSTGRESQL_REPLICATION_PASSWORD=repl_password
      - POSTGRESQL_USERNAME=c5_admin
      - POSTGRESQL_PASSWORD=c5_secret
      - POSTGRESQL_DATABASE=c5_alertas
    ports:
      - "5432:5432"
    networks:
      - c5_network
    volumes:
      - pg_primary_data:/bitnami/postgresql

  postgres-replica:
    image: bitnami/postgresql:latest
    container_name: c5_postgres_replica
    depends_on:
      - postgres-primary
    environment:
      - POSTGRESQL_REPLICATION_MODE=slave
      - POSTGRESQL_MASTER_HOST=postgres-primary
      - POSTGRESQL_MASTER_PORT_NUMBER=5432
      - POSTGRESQL_REPLICATION_USER=repl_user
      - POSTGRESQL_REPLICATION_PASSWORD=repl_password
    ports:
      - "5433:5432"
    networks:
      - c5_network
    volumes:
      - pg_replica_data:/bitnami/postgresql

  # ==========================================
  # BALANCEADOR DE CARGA
  # ==========================================
  
  nginx-lb:
    image: nginx:alpine
    container_name: c5_nginx_lb
    ports:
      - "8080:80"
    volumes:
      - ./services/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - recepcion
    networks:
      - c5_network

  # ==========================================
  # MICROSERVICIOS
  # ==========================================

  recepcion:
    build:
      context: ./services/recepcion
    networks:
      - c5_network
    deploy:
      replicas: 3
    environment:
      - MQTT_BROKER=mosquitto
      - GRPC_GEOLOCALIZACION_URL=geolocalizacion:50051
    depends_on:
      - mosquitto

  geolocalizacion:
    build:
      context: ./services/geolocalizacion
    container_name: c5_geolocalizacion
    networks:
      - c5_network
    ports:
      - "50051:50051"

  prioridad:
    build:
      context: ./services/prioridad
    container_name: c5_prioridad
    networks:
      - c5_network
    depends_on:
      - redis

  notificaciones:
    build:
      context: ./services/notificaciones
    container_name: c5_notificaciones
    networks:
      - c5_network
    ports:
      - "3000:3000" # Puerto para WebSockets
    depends_on:
      - redis

  historial:
    build:
      context: ./services/historial
    container_name: c5_historial
    networks:
      - c5_network
    environment:
      - DB_PRIMARY_URL=postgres://c5_admin:c5_secret@postgres-primary:5432/c5_alertas
      - DB_REPLICA_URL=postgres://c5_admin:c5_secret@postgres-replica:5432/c5_alertas
    depends_on:
      - postgres-primary
      - postgres-replica
  
  # ==========================================
  # FRONTEND (OPERADORES C5)
  # ==========================================
  frontend:
    build:
      context: ./frontend
    container_name: c5_frontend
    ports:
      - "80:5173" 
    networks:
      - c5_network
    environment:
      # Variable de entorno para que React sepa a dónde conectar el WebSocket
      - VITE_WS_URL=ws://localhost:3000 
    depends_on:
      - notificaciones

networks:
  c5_network:
    driver: bridge

volumes:
  pg_primary_data:
  pg_replica_data: